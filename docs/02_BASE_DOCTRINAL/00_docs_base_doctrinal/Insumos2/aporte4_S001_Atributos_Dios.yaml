# ============================================
# VISUALIZACIÓN (Diagrama Mermaid)
# ============================================

diagrama_mermaid: |
  graph TD
      C1[<b>C1: ASEIDAD</b><br/>Existe por sí mismo<br/>Éxodo 3:14<br/>'YO SOY EL QUE SOY'] --> C2[<b>C2: ETERNIDAD</b><br/>Sin principio ni fin<br/>Salmo 90:2<br/>'Desde el siglo... tú eres Dios']
      
      C1 --> C4[<b>C4: INFINITUD</b><br/>Sin límites<br/>Salmo 147:5<br/>'Su entendimiento es infinito']
      
      C2 --> C3[<b>C3: INMUTABILIDAD</b><br/>No cambia<br/>Malaquías 3:6<br/>'Jehová no cambio']
      
      C3 --> C5[<b>C5: PERFECCIÓN</b><br/>Sin deficiencia<br/>Mateo 5:48<br/>'Vuestro Padre... es perfecto']
      
      C4 --> C5
      
      C5 -.refuerza.-> C3
      
      style C1 fill:#FFD700,stroke:#8B4513,stroke-width:4px,color:#000
      style C2 fill:#87CEEB,stroke:#00008B,stroke-width:3px,color:#000
      style C3 fill:#98FB98,stroke:#006400,stroke-width:3px,color:#000
      style C4 fill:#DDA0DD,stroke:#4B0082,stroke-width:3px,color:#000
      style C5 fill:#FFA07A,stroke:#8B0000,stroke-width:4px,color:#000
      
      classDef kernelNode fill:#ffffcc,stroke:#ff9900,stroke-width:2px
      
      linkStyle 0 stroke:#8B4513,stroke-width:3px
      linkStyle 1 stroke:#8B4513,stroke-width:3px
      linkStyle 2 stroke:#00008B,stroke-width:3px
      linkStyle 3 stroke:#006400,stroke-width:3px
      linkStyle 4 stroke:#4B0082,stroke-width:3px
      linkStyle 5 stroke:#8B0000,stroke-width:2px,stroke-dasharray: 5 5

diagrama_explicacion: |
  LEYENDA DEL DIAGRAMA:
  
  Colores:
  - Dorado (C1): Aseidad es fundamento primario (de aquí fluye todo)
  - Azul cielo (C2): Eternidad (temporal)
  - Verde (C3): Inmutabilidad (estabilidad)
  - Púrpura (C4): Infinitud (expansión)
  - Coral (C5): Perfección (cumbre integradora)
  
  Tipos de flecha:
  - Sólida gruesa: FUNDAMENTA (base lógica necesaria)
  - Sólida mediana: IMPLICA (consecuencia necesaria)
  - Punteada: REFUERZA (bucle de coherencia)
  
  Orden de lectura:
  1. C1 (Aseidad) es el axioma primario
  2. De C1 fluyen C2 (Eternidad) y C4 (Infinitud)
  3. C2 genera C3 (Inmutabilidad)
  4. C3 y C4 convergen en C5 (Perfección)
  5. C5 refuerza C3 (bucle de coherencia teológica)

