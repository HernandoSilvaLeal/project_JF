# ============================================
# NOTAS TEOLÓGICAS ADICIONALES
# ============================================

notas_teologicas:
  
  hermeneutica_reformada_vs_dispensacional:
    observacion: |
      Aunque esta servilleta alcanza 100% de convergencia, es importante 
      notar matices hermenéuticos:
      
      - Reformados enfatizan atemporalidad absoluta de Dios (eternidad como 
        existencia sin sucesión)
      - Algunos dispensacionales enfatizan más 'duración infinita' que 
        'atemporalidad' (pero ambos afirman eternidad)
      
      Para kernel, usamos formulación que ambas tradiciones aceptan: 
      "sin principio ni fin, trascendiendo el tiempo"
    
    resolucion: "Kernel permanece en zona de 100% convergencia; matices se documentan como notas, no como divisiones"
  
  antropomorfismos:
    observacion: |
      Textos como Génesis 6:6 ("se arrepintió Jehová") parecen contradecir 
      inmutabilidad. Resolución clásica:
      
      - Dios usa lenguaje humano (acomodación) para comunicar realidades 
        que exceden comprensión humana
      - "Arrepentirse" describe cambio en relación Dios-humanidad, no 
        cambio en Dios mismo
      - Similar a "Dios desciende" (Gn 11:5) - no movimiento espacial literal
    
    textos_clave:
      - "Números 23:19 - Dios no es hombre para que se arrepienta"
      - "1 Samuel 15:29 - El que es la Gloria de Israel... no se arrepentirá"
  
  judios_caraitas:
    observacion: |
      Incluimos judíos caraítas en convergencia porque:
      
      1. Rechazan Talmud como autoritativo (solo Tanaj)
      2. Afirman atributos divinos básicos compatibles con cristianismo
      3. Algunos segmentos aceptan mesianismo (Yeshua como Mesías)
      
      IMPORTANTE: No todos los caraítas son mesiánicos, pero los que sí 
      lo son mantienen teología muy compatible con reformados/dispensacionales 
      en doctrina de Dios
    
    fuentes_contacto: "Nehemia Gordon (erudito caraíta), One for Israel (ministerio mesiánico)"

