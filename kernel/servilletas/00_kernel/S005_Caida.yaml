    status: "PASS"
  consecuencias_muerte:
    descripcion: "Muerte culpa, corrupción, separación de Dios"
    status: "PASS"
  depravacion_total:
    descripcion: "Naturaleza completamente corrompida, incapaz sin gracia"
    status: "PASS"

