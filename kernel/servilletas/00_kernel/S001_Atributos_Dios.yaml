salidas:
  
  - id: S002
    titulo: "La Trinidad: Un Dios en Tres Personas"
    dependencia_primaria: C1_ASEIDAD
    explicacion: "Aseidad fundamenta unidad de esencia trinitaria (un ser auto-existente, tres personas)"
    textos_puente: ["Juan 5:26", "Juan 17:5"]
  
  - id: S003
    titulo: "Santidad y Justicia de Dios"
    dependencia_primaria: C5_PERFECCION
    explicacion: "Perfección implica santidad perfecta (ausencia de mal) y justicia perfecta (rectitud)"
    textos_puente: ["Isaías 6:3", "Deuteronomio 32:4"]
  
  - id: S004
    titulo: "Amor y Misericordia de Dios"
    dependencia_primaria: C5_PERFECCION
    explicacion: "Perfección incluye amor perfecto y misericordia perfecta"
    textos_puente: ["1 Juan 4:8", "Salmo 103:8"]
  
